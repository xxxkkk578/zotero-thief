<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })">
  <label>
    <html:h2 id="zotero-prefpane-__addonRef__-title" data-l10n-id="pref-title"></html:h2>
  </label>
  <checkbox id="zotero-prefpane-__addonRef__-enable" preference="enable" data-l10n-id="pref-enable" />
  <hbox align="center">
    <html:label id="zotero-prefpane-__addonRef__-language-label" for="zotero-prefpane-__addonRef__-language"
      data-l10n-id="pref-language"></html:label>
    <html:select id="zotero-prefpane-__addonRef__-language" preference="language">
      <html:option value="zh-CN" data-l10n-id="pref-language-option-zh"></html:option>
      <html:option value="en-US" data-l10n-id="pref-language-option-en"></html:option>
    </html:select>
  </hbox>
  <hbox align="center">
    <html:label id="zotero-prefpane-__addonRef__-novel-font-size-label"
      for="zotero-prefpane-__addonRef__-novel-font-size" data-l10n-id="pref-novel-font-size"></html:label>
    <html:input type="number" min="8" max="72" step="1" id="zotero-prefpane-__addonRef__-novel-font-size"
      preference="novelFontSize"></html:input>
  </hbox>
  <hbox align="center">
    <html:label id="zotero-prefpane-__addonRef__-book-storage-path-label"
      for="zotero-prefpane-__addonRef__-book-storage-path" data-l10n-id="pref-book-storage-path"></html:label>
    <html:input type="text" id="zotero-prefpane-__addonRef__-book-storage-path" readonly="readonly"
      preference="bookStoragePath"></html:input>
  </hbox>
  <hbox align="center">
    <html:button id="zotero-prefpane-__addonRef__-book-storage-select" data-l10n-id="pref-book-storage-select">
    </html:button>
    <html:button id="zotero-prefpane-__addonRef__-book-storage-open" data-l10n-id="pref-book-storage-open">
    </html:button>
    <html:button id="zotero-prefpane-__addonRef__-book-storage-clear" data-l10n-id="pref-book-storage-clear">
    </html:button>
  </hbox>
  <separator class="thin" />
  <label>
    <html:h3 id="zotero-prefpane-__addonRef__-book-shelf-title" data-l10n-id="pref-book-shelf-title"></html:h3>
  </label>
  <html:label id="zotero-prefpane-__addonRef__-book-shelf-hint" data-l10n-id="pref-book-shelf-hint"></html:label>
  <html:select id="zotero-prefpane-__addonRef__-book-shelf" size="1" flex="1"></html:select>
  <html:label id="zotero-prefpane-__addonRef__-book-shelf-status"></html:label>
  <html:label id="zotero-prefpane-__addonRef__-book-shelf-select-hint" data-l10n-id="pref-book-shelf-select-hint">
  </html:label>
  <separator class="thin" />
  <label>
    <html:h3 id="zotero-prefpane-__addonRef__-shortcuts-title" data-l10n-id="pref-shortcuts-title"></html:h3>
  </label>
  <hbox align="center">
    <html:label id="zotero-prefpane-__addonRef__-shortcut-forward-label"
      for="zotero-prefpane-__addonRef__-shortcut-forward" data-l10n-id="pref-shortcut-forward"></html:label>
    <html:input type="text" maxlength="1" size="2" id="zotero-prefpane-__addonRef__-shortcut-forward"
      preference="shortcutForward"></html:input>
  </hbox>
  <hbox align="center">
    <html:label id="zotero-prefpane-__addonRef__-shortcut-backward-label"
      for="zotero-prefpane-__addonRef__-shortcut-backward" data-l10n-id="pref-shortcut-backward"></html:label>
    <html:input type="text" maxlength="1" size="2" id="zotero-prefpane-__addonRef__-shortcut-backward"
      preference="shortcutBackward"></html:input>
  </hbox>
  <hbox align="center">
    <html:label id="zotero-prefpane-__addonRef__-shortcut-boss-label" for="zotero-prefpane-__addonRef__-shortcut-boss"
      data-l10n-id="pref-shortcut-boss"></html:label>
    <html:input type="text" maxlength="1" size="2" id="zotero-prefpane-__addonRef__-shortcut-boss"
      preference="shortcutBoss"></html:input>
  </hbox>
  <hbox align="center">
    <html:label id="zotero-prefpane-__addonRef__-shortcut-show-label" for="zotero-prefpane-__addonRef__-shortcut-show"
      data-l10n-id="pref-shortcut-show"></html:label>
    <html:input type="text" maxlength="1" size="2" id="zotero-prefpane-__addonRef__-shortcut-show"
      preference="shortcutShow"></html:input>
  </hbox>
</groupbox>
<vbox>
  <html:label data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'></html:label>
</vbox>
